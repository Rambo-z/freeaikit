name: Keyword Monitor

on:
  schedule:
    # Run daily at 02:00 UTC (10:00 Beijing time)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_trends:
        description: 'Run Google Trends monitor'
        type: boolean
        default: true
      run_suggest:
        description: 'Run Google Suggest monitor'
        type: boolean
        default: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # pytrends needs time for 366 queries

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/keyword-monitor/requirements.txt

      - name: Run Google Trends monitor
        if: ${{ github.event_name == 'schedule' || github.event.inputs.run_trends == 'true' }}
        working-directory: scripts/keyword-monitor
        run: python trends_monitor.py
        continue-on-error: true  # Don't fail the whole job if Trends gets rate-limited

      - name: Run Google Suggest monitor
        if: ${{ github.event_name == 'schedule' || github.event.inputs.run_suggest == 'true' }}
        working-directory: scripts/keyword-monitor
        run: python suggest_monitor.py

      - name: Generate merged report & sync to Bitable
        working-directory: scripts/keyword-monitor
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP: JEAMbCEtQaXV6KsGLI9cOgfynpe
          FEISHU_BITABLE_TABLE: tbl9yk0J67xFBJ2N
        run: python report_generator.py

      - name: Commit reports to repository
        run: |
          git config user.name "keyword-bot"
          git config user.email "bot@freeaikit.app"
          git add data/keywords/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: daily keyword report $(date -u +%Y-%m-%d)"
            git push
          fi
