name: Keyword Monitor

on:
  schedule:
    # Run every 2 hours, 12 times a day — each run handles ~10 roots
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: 'Batch index (0-11), leave empty for auto'
        type: string
        default: ''
      limit:
        description: 'Max roots per run (for testing, e.g. 2)'
        type: string
        default: ''
      run_trends:
        description: 'Run Google Trends monitor'
        type: boolean
        default: true
      run_suggest:
        description: 'Run Google Suggest monitor'
        type: boolean
        default: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/keyword-monitor/requirements.txt

      - name: Calculate batch index
        id: batch
        run: |
          if [ -n "${{ github.event.inputs.batch }}" ]; then
            echo "index=${{ github.event.inputs.batch }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            BATCH=$((HOUR / 2))
            echo "index=$BATCH" >> $GITHUB_OUTPUT
          fi

      - name: Build limit flag
        id: limit
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            echo "flag=--limit ${{ github.event.inputs.limit }}" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi

      - name: Run Google Trends monitor (batch)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.run_trends == 'true' }}
        working-directory: scripts/keyword-monitor
        run: python trends_monitor.py --batch ${{ steps.batch.outputs.index }} ${{ steps.limit.outputs.flag }}
        continue-on-error: true

      - name: Run Google Suggest monitor (batch)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.run_suggest == 'true' }}
        working-directory: scripts/keyword-monitor
        run: python suggest_monitor.py --batch ${{ steps.batch.outputs.index }} ${{ steps.limit.outputs.flag }}

      - name: Generate merged report & sync to Bitable
        working-directory: scripts/keyword-monitor
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP: JEAMbCEtQaXV6KsGLI9cOgfynpe
          FEISHU_BITABLE_TABLE: tbl9yk0J67xFBJ2N
        run: python report_generator.py

      - name: Commit reports to repository
        run: |
          git config user.name "keyword-bot"
          git config user.email "bot@freeaikit.app"
          git add data/keywords/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: keyword batch ${{ steps.batch.outputs.index }} $(date -u +%Y-%m-%d-%H%M)"
            git push
          fi
