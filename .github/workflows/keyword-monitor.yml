name: Keyword Monitor

on:
  schedule:
    # Run every 4 hours, 6 times a day — each run handles ~22 queries
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: 'Batch index (0-5), leave empty for auto'
        type: string
        default: ''
      limit:
        description: 'Max roots per run (for testing, e.g. 2)'
        type: string
        default: ''

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
      DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_BITABLE_APP: JEAMbCEtQaXV6KsGLI9cOgfynpe
      FEISHU_BITABLE_TABLE: tbl9yk0J67xFBJ2N

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/keyword-monitor/requirements.txt

      - name: Calculate batch index
        id: batch
        run: |
          if [ -n "${{ github.event.inputs.batch }}" ]; then
            echo "index=${{ github.event.inputs.batch }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            BATCH=$((HOUR / 4 % 6))
            echo "index=$BATCH" >> $GITHUB_OUTPUT
          fi

      - name: Build limit flag
        id: limit
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            echo "flag=--limit ${{ github.event.inputs.limit }}" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi

      - name: Run Google Trends monitor (batch)
        working-directory: scripts/keyword-monitor
        run: python trends_monitor.py --batch ${{ steps.batch.outputs.index }} ${{ steps.limit.outputs.flag }}

      - name: Run Google Suggest monitor (batch)
        working-directory: scripts/keyword-monitor
        run: python suggest_monitor.py --batch ${{ steps.batch.outputs.index }} ${{ steps.limit.outputs.flag }}

      - name: Generate report, enrich volume & sync to Bitable
        working-directory: scripts/keyword-monitor
        run: python report_generator.py

      - name: Commit reports to repository
        run: |
          git config user.name "keyword-bot"
          git config user.email "bot@freeaikit.app"
          git add data/keywords/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: keyword batch ${{ steps.batch.outputs.index }} $(date -u +%Y-%m-%d-%H%M)"
            git push
          fi
